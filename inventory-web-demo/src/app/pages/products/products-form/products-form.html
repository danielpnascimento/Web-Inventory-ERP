<form class="text-center mt-4 mb-4" [formGroup]="form" (ngSubmit)="save()">

  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex">
      <i class="bi bi-box-seam ms-3 me-3 fs-3"></i>
      <h5 class="mt-2 mb-0">Product</h5>
    </div>

    <button
      class="btn btn-sm btn-outline-warning  shadow-sm rounded-pill py-1 ps-1 pe-3 d-flex align-items-center gap-2 mt-2 me-3"
      type="button" title="Tips of Measures" (click)="toggleTableMeasurements()">
      <span class="icon-circle bg-secondary d-flex align-items-center justify-content-center">
        <i class="bi bi-cup fs-6"></i>
      </span>
      <span class='text-dark'>Tips of Measures!</span>
    </button>
  </div>

  <!-- Table of measures here that makes the table expand inside the form where you point/call by the selector -->
  <div class="row w-100 mx-auto px-2" *ngIf="showTableMeasurements">
    <app-measurement-table-cup></app-measurement-table-cup>
  </div>

  <!-- NAME -->
  <div class="w-100 mb-4">
    <input class="form-control rounded-pill shadow-sm bg-light " placeholder="Product Name" formControlName="name">
  </div>

  <!-- PRICE -->
  <div class="d-flex justify-content-center align-items-center mb-4">
    <div class="w-25">
      <input type="number" class="form-control rounded-pill shadow-sm bg-light text-center" placeholder="Price"
        min="0.01" step="0.01" formControlName="price">
    </div>
  </div>

  <!-- Compositions -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex">
      <i class="bi bi-basket ms-3 me-3 fs-3"></i>
      <h5 class="mt-2 mb-0">Ingredients</h5>
    </div>
  </div>


  <!-- INGREDIENTS -->
  <div formArrayName="compositions" class="mt-4">

    <!-- This way of organizing them without so many lg, md and sm properties is the cleanest and most perfect "d-flex gap-2 align-items-center mb-3" -->
    <div *ngFor="let comp of compositions.controls; let i = index;" [formGroupName]="i"
      class="d-flex gap-2 align-items-center mb-3">

      <!-- MATERIAL -->
      <select class="form-select rounded-pill shadow-sm bg-light material-select" formControlName="rawMaterialId"
        [ngClass]="{'text-muted': !comp.get('rawMaterialId')?.value}">

        <option [ngValue]="null" disabled>Material</option>

        <option *ngFor="let m of materials" [ngValue]="m.id">
          {{ m.name }}
        </option>

      </select>

      <!-- QUANTITY -->
      <input type="number"
        class="form-control rounded-pill shadow-sm bg-light text-center custom-width-input-quantity-form"
        [min]="comp.get('measure')?.value === 'UN' ? 1 : 0.01" [step]="comp.get('measure')?.value === 'UN' ? 1 : 0.01"
        placeholder="Quantity" formControlName="quantityRequired">

      <!-- MEASURE -->
      <select class="form-select rounded-pill shadow-sm bg-light measure-select" formControlName="measure"
        [ngClass]="{'text-muted': !comp.get('measure')?.value}">
        <option [ngValue]="null" disabled>Measure</option>

        <option *ngFor="let m of measures" [ngValue]="m.value">
          {{ m.text }}
        </option>
      </select>

      <!-- REMOVE -->
      <button type="button" class="btn btn-outline-danger rounded-pill shadow-sm px-2" (click)="removeComposition(i)">
        <i class="bi bi-x"></i>
      </button>

    </div>
  </div>

  <!-- ADD BUTTON -->
  <div class="mt-4">
    <button type="button" class="btn btn-outline-secondary rounded-pill shadow-sm w-100" (click)="addComposition()">
      <i class="bi bi-plus-lg me-2"></i>
      Add ingredient
    </button>
  </div>

  <!-- SAVE -->
  <div class="mt-5">
    <button class="btn btn-outline-dark rounded-pill shadow-sm w-100" type="submit">
      Save Product
    </button>
  </div>

</form>
