<form class="text-center mt-4" [formGroup]="form" (ngSubmit)="save()">


  <div class="d-flex align-items-center justify-content-between mb-4">
    <div class="d-flex">
      <i class="bi bi-basket ms-3 me-3 fs-3"></i>
      <h5 class="mt-2 mb-0">Material</h5>
    </div>

    <button
      class="btn btn-sm btn-outline-warning  shadow-sm rounded-pill py-1 ps-1 pe-3 d-flex align-items-center gap-2 mt-2 me-3"
      type="button" title="Tips of Measures" (click)="toggleTableMeasurements()">
      <span class="icon-circle bg-secondary d-flex align-items-center justify-content-center">
        <i class="bi bi-measuring-cup fs-6"></i>
      </span>
      <span class='text-dark'>Tips of Measures!</span>
    </button>
  </div>

  <div class="row w-100 mx-auto px-2" *ngIf="showTableMeasurements">
    <app-measurement-table-cup></app-measurement-table-cup>
  </div>

  <div class="w-100 mb-4">
    <input class="form-control rounded-pill shadow-sm bg-light" placeholder="Name of Material" formControlName="name">
  </div>


  <div class="d-flex justify-content-center align-items-center mb-2">
    <div class="custom-width-input-quantity-form mb-3 me-5">
      <input type="number" class="form-control rounded-pill shadow-sm bg-light "
        [min]="form.get('measure')?.value === 'UN' ? 1 : 0.01" [step]="form.get('measure')?.value === 'UN' ? 1 : 0.01"
        placeholder="Quantity" formControlName="quantityInStock">
    </div>

    <div class=" mb-3">
      <select class="form-select rounded-pill shadow-sm bg-light measure-select" formControlName="measure"
        [ngClass]="{'text-muted': !form.get('measure')?.value}">
        <option value="null" disabled>Measures</option>

        @for (material of measures; track material.value) {
        <option [value]="material.value">
          {{material.text}}
        </option>
        }
      </select>
    </div>

  </div>


  <div class="mt-5">
    <button class="btn btn-outline-dark rounded-pill shadow-sm mb-5 w-100" type="submit">
      Save Material
    </button>
  </div>



</form>
